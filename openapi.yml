openapi: 3.1.0
info:
  title: Chanwoo Reminder API
  description: Apple Reminders 스타일 웹 애플리케이션 API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/lists:
    get:
      tags:
        - ReminderList
      summary: 전체 리스트 조회
      operationId: getAllLists
      responses:
        '200':
          description: 리스트 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderListResponse'

    post:
      tags:
        - ReminderList
      summary: 리스트 생성
      operationId: createList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderListRequest'
      responses:
        '201':
          description: 리스트 생성 완료
          headers:
            Location:
              description: 생성된 리스트의 URI
              schema:
                type: string
                example: /api/lists/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderListResponse'

  /api/lists/{id}:
    parameters:
      - $ref: '#/components/parameters/ListId'

    get:
      tags:
        - ReminderList
      summary: 단일 리스트 조회
      operationId: getListById
      responses:
        '200':
          description: 리스트 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - ReminderList
      summary: 리스트 수정
      operationId: updateList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderListRequest'
      responses:
        '200':
          description: 수정된 리스트 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - ReminderList
      summary: 리스트 삭제
      operationId: deleteList
      responses:
        '204':
          description: 삭제 완료
        '404':
          $ref: '#/components/responses/NotFound'

  /api/lists/{listId}/reminders:
    parameters:
      - name: listId
        in: path
        required: true
        description: 리스트 ID
        schema:
          type: integer
          format: int64

    get:
      tags:
        - Reminder
      summary: 리스트별 리마인더 조회
      operationId: getRemindersByList
      parameters:
        - name: completed
          in: query
          required: false
          description: 완료 여부 필터
          schema:
            type: boolean
      responses:
        '200':
          description: 리마인더 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderResponse'

    post:
      tags:
        - Reminder
      summary: 리마인더 생성
      operationId: createReminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderRequest'
      responses:
        '201':
          description: 리마인더 생성 완료
          headers:
            Location:
              description: 생성된 리마인더의 URI
              schema:
                type: string
                example: /api/reminders/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderResponse'

  /api/reminders/{id}:
    parameters:
      - $ref: '#/components/parameters/ReminderId'

    get:
      tags:
        - Reminder
      summary: 단일 리마인더 조회
      operationId: getReminderById
      responses:
        '200':
          description: 리마인더 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Reminder
      summary: 리마인더 수정
      operationId: updateReminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderRequest'
      responses:
        '200':
          description: 수정된 리마인더 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Reminder
      summary: 리마인더 삭제
      operationId: deleteReminder
      responses:
        '204':
          description: 삭제 완료
        '404':
          $ref: '#/components/responses/NotFound'

  /api/reminders/{id}/toggle:
    parameters:
      - $ref: '#/components/parameters/ReminderId'

    patch:
      tags:
        - Reminder
      summary: 리마인더 완료 토글
      operationId: toggleReminder
      responses:
        '200':
          description: 토글된 리마인더 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/reminders/today:
    get:
      tags:
        - Reminder
      summary: 오늘 마감 리마인더 조회
      operationId: getTodayReminders
      responses:
        '200':
          description: 오늘 마감 미완료 리마인더 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderResponse'

  /api/reminders/scheduled:
    get:
      tags:
        - Reminder
      summary: 예정된 리마인더 조회
      operationId: getScheduledReminders
      responses:
        '200':
          description: 마감일이 설정된 미완료 리마인더 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderResponse'

  /api/reminders/all:
    get:
      tags:
        - Reminder
      summary: 전체 미완료 리마인더 조회
      operationId: getAllReminders
      responses:
        '200':
          description: 전체 미완료 리마인더 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderResponse'

  /api/reminders/completed:
    get:
      tags:
        - Reminder
      summary: 완료된 리마인더 조회
      operationId: getCompletedReminders
      responses:
        '200':
          description: 완료된 리마인더 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReminderResponse'

components:
  parameters:
    ListId:
      name: id
      in: path
      required: true
      description: 리스트 ID
      schema:
        type: integer
        format: int64

    ReminderId:
      name: id
      in: path
      required: true
      description: 리마인더 ID
      schema:
        type: integer
        format: int64

  schemas:
    ReminderListRequest:
      type: object
      properties:
        name:
          type: string
          example: 장보기
        color:
          type: string
          description: HEX 색상 코드 (null이면 기본값 #007AFF)
          example: '#FF3B30'
        icon:
          type: string
          description: 아이콘 이름 (null이면 기본값 list.bullet)
          example: star

    ReminderListResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 장보기
        color:
          type: string
          example: '#007AFF'
        icon:
          type: string
          example: list.bullet
        incompleteCount:
          type: integer
          description: 미완료 리마인더 수
          example: 3

    ReminderRequest:
      type: object
      properties:
        title:
          type: string
          example: 우유 사기
        memo:
          type: string
          example: 저지방 우유
        dueDate:
          type: string
          format: date
          example: '2026-03-20'
        dueTime:
          type: string
          format: time
          example: '14:00:00'
        priority:
          $ref: '#/components/schemas/Priority'
        isCompleted:
          type: boolean
        listId:
          type: integer
          format: int64
          description: 리마인더를 다른 리스트로 이동할 때 사용

    ReminderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: 우유 사기
        memo:
          type: string
          example: 저지방 우유
        dueDate:
          type: string
          format: date
        dueTime:
          type: string
          format: time
        priority:
          $ref: '#/components/schemas/Priority'
        isCompleted:
          type: boolean
          example: false
        completedAt:
          type: string
          format: date-time
        listId:
          type: integer
          format: int64
          example: 1
        listName:
          type: string
          example: 장보기
        listColor:
          type: string
          example: '#007AFF'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Priority:
      type: string
      enum:
        - NONE
        - LOW
        - MEDIUM
        - HIGH
      example: NONE

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: List not found: 999

  responses:
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
